name: Fetch Match Data

on:
  schedule:
    - cron: '*/2 * * * *'   # 每2分钟
  workflow_dispatch:          # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FotMob data
        run: |
          python3 << 'PYEOF'
          import urllib.request, re, json, os

          SLUG = os.environ.get('MATCH_SLUG', 'aston-villa-vs-manchester-united/3h9f6s')
          url  = f'https://www.fotmob.com/matches/{SLUG}'

          req = urllib.request.Request(url, headers={
            'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
            'Accept-Language': 'en-US,en;q=0.5',
          })
          html = urllib.request.urlopen(req, timeout=20).read().decode('utf-8', errors='ignore')

          m = re.search(r'<script id="__NEXT_DATA__" type="application/json">(.*?)</script>', html, re.DOTALL)
          if not m:
              print('ERROR: __NEXT_DATA__ not found')
              exit(1)

          raw  = json.loads(m.group(1))
          props = raw['props']['pageProps']
          header  = props.get('header', {})
          general = props.get('general', {})
          content = props.get('content', {})
          teams   = header.get('teams', [])
          status  = header.get('status', {})
          lineup  = content.get('lineup', {})
          facts   = content.get('matchFacts', {})

          # ── score & status ──────────────────────────────────────
          out = {
            'fetchedAt': '',
            'score': {
              'home': teams[0].get('score', 0) if teams else 0,
              'away': teams[1].get('score', 0) if len(teams) > 1 else 0,
            },
            'status': {
              'liveTime': (status.get('liveTime') or {}).get('short', ''),
              'scoreStr': status.get('scoreStr', ''),
              'reason':   (status.get('reason') or {}).get('short', ''),
            },
            'events': [],
            'stats':  [],
          }

          # ── events ──────────────────────────────────────────────
          for e in (facts.get('events') or {}).get('events', []):
              t = e.get('type', '')
              if t in ('AddedTime', 'Half'):
                  continue
              swap = e.get('swap') or []
              out['events'].append({
                  'type':      t,
                  'time':      e.get('timeStr', e.get('time', 0)),
                  'overload':  e.get('overloadTime'),
                  'isHome':    e.get('isHome'),
                  'player':    (e.get('player') or {}).get('name', ''),
                  'card':      e.get('card', ''),
                  'swap':      [{'name': s.get('name', '')} for s in swap] if isinstance(swap, list) else [],
              })

          # ── stats ────────────────────────────────────────────────
          stat_label = {
            'BallPossesion': '控球率', 'expected_goals': '预期进球 xG',
            'total_shots': '总射门', 'Shots_on_target_': '射正',
            'BigChances': '大机会', 'ShotsInsideBox': '禁区内射门',
            'Corners': '角球', 'Passes_accurate': '传球成功率',
            'Fouls': '犯规', 'YellowCards': '黄牌', 'Saves': '门将扑救',
          }
          for group in (content.get('stats') or {}).get('Periods', {}).get('All', {}).get('stats', []):
              for s in group.get('stats', []):
                  vals = s.get('stats', [])
                  v0, v1 = (vals[0] if vals else None), (vals[1] if len(vals) > 1 else None)
                  if v0 is None:
                      continue
                  key   = s.get('key', '')
                  label = stat_label.get(key, s.get('title', key))
                  fmt   = s.get('format', '')
                  def fmtv(v):
                      if v is None: return '-'
                      return f'{float(v):.2f}' if fmt == 'double' else str(v)
                  total = (v0 or 0) + (v1 or 0)
                  muP = round(v0 * 100 / total) if total and isinstance(v0, (int, float)) else 50
                  out['stats'].append({
                      'label': label, 'mu': fmtv(v0), 'av': fmtv(v1),
                      'muP': muP, 'avP': 100 - muP,
                  })

          import datetime
          out['fetchedAt'] = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print(f"OK: {teams[0].get('name') if teams else '?'} {out['score']['home']} - {out['score']['away']} {teams[1].get('name') if len(teams)>1 else '?'}")
          print(f"Status: {out['status']}")
          print(f"Events: {len(out['events'])}, Stats: {len(out['stats'])}")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || git commit -m "data: live update $(date -u +%H:%M:%SZ)"
          git push
